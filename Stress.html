<!DOCTYPE html>
<html>
<head>
    <title>Stress Buster - KUBRAJUEX</title>
    <style>
        body { background: #111; color: #00ff88; text-align: center; font-family: 'Courier New', Courier, monospace; }
        #circle { width: 150px; height: 150px; background: #00ff88; border-radius: 50%; margin: 100px auto; cursor: pointer; box-shadow: 0 0 20px #00ff88; }
        #circle:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <h1>CLICK THE BALL TO REMOVE STRESS</h1>
    <h2 id="score">Clicks: 0</h2>
    <div id="circle" onclick="addScore()"></div>
    <script>
        let count = 0;
        function addScore() {
            count++;
            document.getElementById("score").innerText = "Clicks: " + count;
            document.body.style.backgroundColor = 'hsl(' + (count * 10) + ', 50%, 10%)';
        }
    </script>
</body>
</html>
