<!DOCTYPE html>
<html>
<head>
    <title>Stress Buster - Mole Smash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hole { background: #3f3f3f; border-radius: 50%; height: 100px; width: 100px; position: relative; overflow: hidden; border: 4px solid #222; }
        .mole { background: #fb923c; width: 80px; height: 80px; position: absolute; bottom: -100%; left: 10px; border-radius: 50%; transition: 0.1s; cursor: pointer; }
        .mole.up { bottom: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white text-center p-10">
    <h1 class="text-4xl font-bold mb-4 text-orange-400">SMASH THE MOLE! 🔨</h1>
    <h2 class="text-2xl mb-8">Score: <span id="score">0</span></h2>
    <div class="grid grid-cols-3 gap-10 max-w-md mx-auto">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>
    <button onclick="startGame()" class="mt-10 bg-orange-500 px-6 py-2 rounded-full font-bold">Start Game</button>

    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        let score = 0; let lastHole; let timeUp = false;

        function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole; return hole;
        }
        function peep() {
            const time = randomTime(500, 1000);
            const hole = randomHole(holes);
            hole.querySelector('.mole').classList.add('up');
            setTimeout(() => {
                hole.querySelector('.mole').classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }
        function startGame() { score = 0; timeUp = false; peep(); setTimeout(() => timeUp = true, 15000); }
        moles.forEach(mole => mole.addEventListener('click', function() {
            score++; this.classList.remove('up'); document.getElementById('score').textContent = score;
        }));
    </script>
</body>
</html>
