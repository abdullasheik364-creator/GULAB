<!DOCTYPE html>
<html>
<head>
    <title>KUBRAJUEX - Flappy Bird</title>
    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: sans-serif; text-align: center; }
        canvas { display: block; margin: 20px auto; border: 5px solid #fff; border-radius: 10px; }
    </style>
</head>
<body>
    <h1 style="color: white; text-shadow: 2px 2px #000;">Flappy Bird - Tap Space!</h1>
    <canvas id="canvas" width="320" height="480"></canvas>
    <script>
        const cvs = document.getElementById("canvas"); const ctx = cvs.getContext("2d");
        let bird = { x: 50, y: 150, w: 20, h: 20, gravity: 1.5, jump: 25 };
        let pipes = []; pipes[0] = { x: cvs.width, y: 0 };
        let score = 0;
        document.addEventListener("keydown", () => bird.y -= bird.jump);
        function draw() {
            ctx.fillStyle = "#70c5ce"; ctx.fillRect(0,0,cvs.width,cvs.height);
            ctx.fillStyle = "yellow"; ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
            bird.y += bird.gravity;
            for(let i=0; i<pipes.length; i++) {
                ctx.fillStyle = "green"; ctx.fillRect(pipes[i].x, 0, 50, 150);
                ctx.fillRect(pipes[i].x, 300, 50, cvs.height);
                pipes[i].x--;
                if(pipes[i].x == 125) pipes.push({ x: cvs.width, y: 0 });
                if(bird.y + bird.h >= cvs.height || bird.x + bird.w >= pipes[i].x && bird.x <= pipes[i].x + 50 && (bird.y <= 150 || bird.y + bird.h >= 300)) location.reload();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
