<!DOCTYPE html>
<html>
<head>
    <title>Dino Run - KUBRAJUEX</title>
    <style>
        body { text-align: center; background: #f7f7f7; font-family: sans-serif; }
        #game { width: 600px; height: 200px; border-bottom: 2px solid #555; margin: 50px auto; overflow: hidden; position: relative; background: white; }
        #dino { width: 50px; height: 50px; background: #555; position: absolute; bottom: 0; left: 50px; }
        #cactus { width: 20px; height: 40px; background: red; position: absolute; bottom: 0; right: -20px; }
        .animate { animation: jump 0.5s linear; }
        @keyframes jump { 0%{bottom:0;} 30%{bottom:100px;} 70%{bottom:100px;} 100%{bottom:0;} }
        .cactus-move { animation: move 1.5s infinite linear; }
        @keyframes move { 0%{right:-20px;} 100%{right:100%;} }
    </style>
</head>
<body onclick="jump()">
    <h1>Tap to Jump!</h1>
    <div id="game">
        <div id="dino"></div>
        <div id="cactus" class="cactus-move"></div>
    </div>
    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        function jump(){ if(!dino.classList.contains("animate")){ dino.classList.add("animate"); setTimeout(()=>dino.classList.remove("animate"),500); } }
        setInterval(()=>{
            let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
            let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));
            if(cactusLeft<90 && cactusLeft>50 && dinoTop>=150){ alert("Game Over!"); location.reload(); }
        }, 10);
    </script>
</body>
</html>
